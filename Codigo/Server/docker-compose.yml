services:
  microsservico:
    image: eclipse-temurin:21-jdk-jammy
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - ./microsservico/target:/app:ro
    env_file:
      - ./microsservico/.env
    environment:
      - JAVA_OPTS=-Xmx512m
      - JAVA_TOOL_OPTIONS=-Djava.net.preferIPv4Stack=true
      - MICRONAUT_SERVER_PORT=8080
    command: ["java", "-jar", "/app/microsservico-0.1.jar"]
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy

  microsservico-b:
    image: eclipse-temurin:21-jdk-jammy
    ports:
      - "8081:8081"
    restart: unless-stopped
    volumes:
      - ./microsservico-b/target:/app:ro
    env_file:
      - ./microsservico-b/.env
    environment:
      - JAVA_OPTS=-Xmx512m
      - JAVA_TOOL_OPTIONS=-Djava.net.preferIPv4Stack=true
      - MICRONAUT_SERVER_PORT=8081
    command: ["java", "-jar", "/app/microsservico-b-0.1.jar"]
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_DB=aluguel-carro
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d aluguel-carro"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge