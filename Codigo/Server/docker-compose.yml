services:
  usersService:
    image: eclipse-temurin:21-jdk-jammy
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - ./usersService/target:/app:ro
    env_file:
      - ./usersService/.env
    environment:
      - JAVA_OPTS=-Xmx512m
      - JAVA_TOOL_OPTIONS=-Djava.net.preferIPv4Stack=true
      - MICRONAUT_SERVER_PORT=8080
    command: ["java", "-jar", "/app/usersService-0.1.jar"]
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy

  vehiclesService:
    image: eclipse-temurin:21-jdk-jammy
    ports:
      - "8081:8081"
    restart: unless-stopped
    volumes:
      - ./vehiclesService/target:/app:ro
    env_file:
      - ./vehiclesService/.env
    environment:
      - JAVA_OPTS=-Xmx512m
      - JAVA_TOOL_OPTIONS=-Djava.net.preferIPv4Stack=true
      - MICRONAUT_SERVER_PORT=8081
    command: ["java", "-jar", "/app/vehiclesService-0.1.jar"]
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy

  rentalsService:
    image: eclipse-temurin:21-jdk-jammy
    ports:
      - "8082:8082"
    restart: unless-stopped
    volumes:
      - ./rentalsService/target:/app:ro
    env_file:
      - ./rentalsService/.env
    environment:
      - JAVA_OPTS=-Xmx512m
      - JAVA_TOOL_OPTIONS=-Djava.net.preferIPv4Stack=true
      - MICRONAUT_SERVER_PORT=8082
    command: ["java", "-jar", "/app/rentalsService-0.1.jar"]
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy

  contratoService:
    image: eclipse-temurin:21-jdk-jammy
    ports:
      - "8083:8083"
    restart: unless-stopped
    volumes:
      - ./contratoService/target:/app:ro
    env_file:
      - ./contratoService/.env
    environment:
      - JAVA_OPTS=-Xmx512m
      - JAVA_TOOL_OPTIONS=-Djava.net.preferIPv4Stack=true
      - MICRONAUT_SERVER_PORT=8083
    command: ["java", "-jar", "/app/contratoService-0.1.jar"]
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy

  reservasService:
    image: eclipse-temurin:21-jdk-jammy
    ports:
      - "8084:8084"
    restart: unless-stopped
    volumes:
      - ./reservasService/target:/app:ro
    env_file:
      - ./reservasService/.env
    environment:
      - JAVA_OPTS=-Xmx512m
      - JAVA_TOOL_OPTIONS=-Djava.net.preferIPv4Stack=true
      - MICRONAUT_SERVER_PORT=8084
    command: ["java", "-jar", "/app/reservasService-0.1.jar"]
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    image: eclipse-temurin:21-jdk-jammy
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - ./gateway/target:/app:ro
    environment:
      - JAVA_OPTS=-Xmx512m
      - MICRONAUT_SERVER_PORT=8000
      - PROXY_TARGETS_USERSSERVICE=http://usersService:8080
      - PROXY_TARGETS_VEHICLESSERVICE=http://vehiclesService:8081
      - PROXY_TARGETS_RENTALSSERVICE=http://rentalsService:8082
      - PROXY_TARGETS_CONTRATOSERVICE=http://contratoService:8083
      - PROXY_TARGETS_RESERVASSERVICE=http://reservasService:8084
    command: ["java", "-jar", "/app/gateway-0.1.jar"]
    networks:
      - app-network
    depends_on:
      - usersService
      - vehiclesService
      - rentalsService
      - contratoService
      - reservasService

  postgres:
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_DB=aluguelcarros
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d aluguelcarros"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  pgweb:
    image: sosedoff/pgweb
    restart: always
    ports:
      - "8090:8081"
    environment:
      - DATABASE_URL=postgres://admin:admin@postgres:5432/aluguelcarros?sslmode=disable
    depends_on:
      - postgres
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge