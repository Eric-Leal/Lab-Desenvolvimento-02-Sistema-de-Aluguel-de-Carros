micronaut:
  application:
    name: gateway
  server:
    port: 8000
    cors:
      enabled: true
      configurations:
        default:
          allowed-origins-regex:
            - "^http://(localhost|127\\.0\\.0\\.1)(:\\d+)?$"
            - "^http://\\[::1\\](:\\d+)?$"
          allowed-methods:
            - "GET"
            - "POST"
            - "PUT"
            - "DELETE"
            - "OPTIONS"
            - "PATCH"
          allowed-headers:
            - "*"
          exposed-headers:
            - "*"
  http:
    client:
      read-timeout: 30s

# Propriedades de roteamento estatico (Docker DNS)
proxy:
  targets:
    usersservice: "http://usersService:8080"
    vehiclesservice: "http://vehiclesService:8081"
    rentalsservice: "http://rentalsService:8082"