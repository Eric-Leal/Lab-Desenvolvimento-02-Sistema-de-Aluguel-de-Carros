proxy:
  targets:
    usersservice: "${PROXY_TARGETS_USERSSERVICE}"
    vehiclesservice: "${PROXY_TARGETS_VEHICLESSERVICE}"
    rentalsservice: "${PROXY_TARGETS_RENTALSSERVICE}"
    contratoservice: "${PROXY_TARGETS_CONTRATOSERVICE}"
    reservasservice: "${PROXY_TARGETS_RESERVASSERVICE}"

micronaut:
  server:
    cors:
      enabled: true
      configurations:
        default:
          allowed-origins:
            - "${FRONTEND_URL}"
          allowed-methods:
            - "GET"
            - "POST"
            - "PUT"
            - "DELETE"
            - "OPTIONS"
            - "PATCH"
          allowed-headers:
            - "*"
          exposed-headers:
            - "*"
