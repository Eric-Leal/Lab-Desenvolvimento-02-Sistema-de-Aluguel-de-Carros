services:
  microsservico:
    image: eclipse-temurin:21-jdk-jammy
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - ./microsservico/target:/app:ro
    env_file:
      - ./microsservico/.env
    environment:
      - JAVA_OPTS=-Xmx512m
      - JAVA_TOOL_OPTIONS=-Djava.net.preferIPv4Stack=true
    command: ["java", "-jar", "/app/microsservico-0.1.jar"]
    depends_on:
      - postgres

  microsservico-b:
    image: eclipse-temurin:21-jdk-jammy
    ports:
      - "8081:8081"
    restart: unless-stopped
    volumes:
      - ./microsservico-b/target:/app:ro
    env_file:
      - ./microsservico-b/.env
    environment:
      - JAVA_OPTS=-Xmx512m
      - JAVA_TOOL_OPTIONS=-Djava.net.preferIPv4Stack=true
      - MICRONAUT_SERVER_PORT=8081
    command: ["java", "-jar", "/app/microsservico-b-0.1.jar"]
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_DB=aluguel-carro
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

volumes:
  postgres_data:
    driver: local
